<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PlayerJS</title>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
		}
		#broadcast-info {
			position: fixed;
			bottom: 20px;
			right: 20px;
			background: rgba(0, 0, 0, 0.8);
			color: #fff;
			padding: 10px 15px;
			border-radius: 5px;
			font-size: 12px;
			font-family: Arial, sans-serif;
			z-index: 1000;
			display: none;
		}
		#broadcast-info.show {
			display: block;
		}
	</style>
</head>
<body>
	<div id="playerjs"></div>
	<div id="broadcast-info">
		<div>📺 <span id="viewers">0</span> смотрят</div>
		<div id="current-title" style="margin-top: 5px; font-weight: bold;"></div>
		<div id="progress-info" style="margin-top: 3px; font-size: 11px;"></div>
	</div>
	<script src="https://cdn.jsdelivr.net/gh/OinkTechLtd/cdnplayerjs@main/playerjs.js"></script>
	<script>
		var ps = location.href.substr(location.href.indexOf("html?") + 5).split("&");
		var vs = { 
			id: "playerjs",
			autoplay: true,
			controls: true,
			seekbar: true
		};

		for (var i = 0; i < ps.length; i++) {
			var p = ps[i].split("=");
			vs[decodeURIComponent(p[0])] = decodeURIComponent(p[1]);
		}

		if (vs.file) {
			vs.file = decodeURIComponent(vs.file);
		}

		function loadBroadcast(playlistUrl) {
			console.log('[v0] Loading broadcast:', playlistUrl);
			fetch('/api/broadcast-sync?playlist=' + encodeURIComponent(playlistUrl))
				.then(r => {
					console.log('[v0] Broadcast sync response:', r.status);
					return r.json();
				})
				.then(data => {
					console.log('[v0] Broadcast data:', data);
					
					if (data.error) {
						console.error('[v0] Broadcast API error:', data.error);
						loadPlaylist(playlistUrl);
						return;
					}
					
					if (data.current && data.playlist && data.playlist.length > 0) {
						console.log('[v0] Broadcast loaded - ' + data.playlist.length + ' videos');
						console.log('[v0] Current: ' + data.current.title + ' at ' + data.current.timeInSeconds + '/' + data.current.duration + 's');
						
						vs.file = data.current.file;
						vs.poster = data.current.logo;
						vs.title = data.current.title;
						vs.playlist = data.playlist.map(function(v) {
							return {
								title: v.title,
								file: v.file,
								poster: v.logo,
								image: v.logo,
								duration: v.duration
							};
						});

						var player = new Playerjs(vs);
						var lastIndex = data.current.index;
						
						// Показываем информацию о трансляции
						updateBroadcastInfo(data);
						
						// Обновляем каждые 1 секунду для синхронизации
						var syncInterval = setInterval(() => {
							fetch('/api/broadcast-sync?playlist=' + encodeURIComponent(playlistUrl))
								.then(r => r.json())
								.then(syncData => {
									if (!syncData.error && syncData.current && syncData.broadcast) {
										updateBroadcastInfo(syncData);
										
										// Проверяем изменился ли индекс видео
										if (syncData.current.index !== lastIndex) {
											console.log('[v0] Switching video to index ' + syncData.current.index + ': ' + syncData.current.title);
											lastIndex = syncData.current.index;
											
											// Обновляем файл и переключаемся
											vs.file = syncData.current.file;
											vs.poster = syncData.current.logo;
											vs.title = syncData.current.title;
											vs.switchPlaylist(syncData.current.index);
										}
									}
								})
								.catch(err => console.error('[v0] Sync error:', err));
						}, 1000);
					} else {
						console.error('[v0] Invalid broadcast data');
						loadPlaylist(playlistUrl);
					}
				})
				.catch(err => {
					console.error('[v0] Broadcast load error:', err);
					// Fallback на обычный плейлист
					loadPlaylist(playlistUrl);
				});
		}

		function loadPlaylist(playlistUrl) {
			console.log('[v0] Loading playlist:', playlistUrl);
			fetch('/api/load-playlist?url=' + encodeURIComponent(playlistUrl))
				.then(r => r.json())
				.then(data => {
					if (data.playlist && data.playlist.length > 0) {
						var playlistItems = [];
						for (var j = 0; j < data.playlist.length; j++) {
							var item = data.playlist[j];
							playlistItems.push({
								title: item.title,
								file: item.file,
								image: item.image || item.poster,
								poster: item.image || item.poster
							});
						}
						
						vs.playlist = playlistItems;
						vs.file = playlistItems[0].file;
						vs.poster = playlistItems[0].poster;
						
						new Playerjs(vs);
					}
				})
				.catch(err => console.error('[v0] Playlist error:', err));
		}

		function updateBroadcastInfo(data) {
			var info = document.getElementById('broadcast-info');
			document.getElementById('viewers').textContent = data.viewers || 0;
			document.getElementById('current-title').textContent = data.current.title;
			
			var mins = Math.floor(data.current.timeInSeconds / 60);
			var secs = Math.floor(data.current.timeInSeconds % 60);
			var totalMins = Math.floor(data.current.duration / 60);
			var totalSecs = Math.floor(data.current.duration % 60);
			
			document.getElementById('progress-info').textContent = 
				mins + ':' + (secs < 10 ? '0' : '') + secs + ' / ' +
				totalMins + ':' + (totalSecs < 10 ? '0' : '') + totalSecs;
			
			info.classList.add('show');
		}

		// Если это плейлист - загрузи как трансляцию
		if (vs.file && vs.file.toLowerCase().includes('.m3u')) {
			loadBroadcast(vs.file);
		} else if (vs.file) {
			// Если PHP скрипт или IP - проксируй через API
			if (vs.file.includes('.php') || /^\d+\.\d+\.\d+\.\d+/.test(vs.file)) {
				vs.file = '/api/stream-proxy?url=' + encodeURIComponent(vs.file);
			}
			new Playerjs(vs);
		} else {
			new Playerjs(vs);
		}
	</script>
</body>
</html>
