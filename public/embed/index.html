<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PlayerJS</title>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			background: #000;
		}
	</style>
</head>
<body>
	<div id="playerjs"></div>
	<script src="https://cdn.jsdelivr.net/gh/OinkTechLtd/cdnplayerjs@main/playerjs.js"></script>
	<script>
		var ps = location.href.substr(location.href.indexOf("html?") + 5).split("&");
		var vs = { 
			id: "playerjs",
			autoplay: true,
			controls: true
		};

		for (var i = 0; i < ps.length; i++) {
			var p = ps[i].split("=");
			vs[decodeURIComponent(p[0])] = decodeURIComponent(p[1]);
		}

		if (vs.file) {
			vs.file = decodeURIComponent(vs.file);
		}

		// Если это M3U плейлист - загрузи как синхронизированный поток (как M3U8)
		if (vs.file && vs.file.toLowerCase().includes('.m3u')) {
			console.log('[v0] Loading M3U as synchronized stream:', vs.file);
			
			function loadSyncStream() {
				fetch('/api/sync-stream?playlist=' + encodeURIComponent(vs.file))
					.then(r => r.json())
					.then(data => {
						if (data.error) {
							console.error('[v0] Sync error:', data.error);
							return;
						}
						
						console.log('[v0] Sync data - index:', data.currentIndex, 'video:', data.currentVideo.title, 'time:', data.currentVideo.timeInSeconds + '/' + data.currentVideo.duration);
						
						if (data.currentVideo && data.playlist) {
							// Преобразуем в формат PlayerJS
							var items = [];
							for (var j = 0; j < data.playlist.length; j++) {
								var item = data.playlist[j];
								items.push({
									title: item.title || ('Видео ' + (j + 1)),
									file: item.file,
									poster: item.logo,
									image: item.logo,
									duration: item.duration
								});
							}
							
							vs.playlist = items;
							vs.file = data.currentVideo.file;
							vs.poster = data.currentVideo.logo;
							vs.title = data.currentVideo.title;
							vs.autoplayPlaylist = true;
							
							// Создаём плеер при первой загрузке
							if (!window.playerInstance) {
								window.playerInstance = new Playerjs(vs);
								console.log('[v0] Player created');
							}
							
							// Запоминаем последний индекс
							window.lastIndex = data.currentIndex;
						}
					})
					.catch(err => console.error('[v0] Sync stream error:', err));
			}
			
			// Загружаем один раз при запуске
			loadSyncStream();
			
			// Проверяем каждые 2 секунды изменился ли текущий видеофайл
			setInterval(() => {
				fetch('/api/sync-stream?playlist=' + encodeURIComponent(vs.file))
					.then(r => r.json())
					.then(data => {
						if (!data.error && data.currentIndex !== window.lastIndex && window.playerInstance) {
							console.log('[v0] Switching to index', data.currentIndex, ':', data.currentVideo.title);
							window.lastIndex = data.currentIndex;
							// Переключаем видео в плеере
							window.playerInstance.switchPlaylist(data.currentIndex);
						}
					})
					.catch(err => console.error('[v0] Sync check error:', err));
			}, 2000);
		} 
		// Если PHP скрипт или IP адрес - проксируй
		else if (vs.file && (vs.file.includes('.php') || /^\d+\.\d+\.\d+\.\d+/.test(vs.file))) {
			console.log('[v0] Using stream proxy');
			vs.file = '/api/stream-proxy?url=' + encodeURIComponent(vs.file);
			new Playerjs(vs);
		}
		// Обычный видеофайл
		else {
			new Playerjs(vs);
		}
	</script>
</body>
</html>
