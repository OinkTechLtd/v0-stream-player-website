<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PlayerJS</title>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			background: #000;
		}
	</style>
</head>
<body>
	<div id="playerjs"></div>
	<script src="https://cdn.jsdelivr.net/gh/OinkTechLtd/cdnplayerjs@main/playerjs.js"></script>
	<script>
		var ps = location.href.substr(location.href.indexOf("html?") + 5).split("&");
		var vs = { 
			id: "playerjs",
			autoplay: true,
			controls: true
		};

		for (var i = 0; i < ps.length; i++) {
			var p = ps[i].split("=");
			vs[decodeURIComponent(p[0])] = decodeURIComponent(p[1]);
		}

		if (vs.file) {
			vs.file = decodeURIComponent(vs.file);
		}

		// Если это M3U плейлист - загрузи и настрой как плейлист для воспроизведения
		if (vs.file && vs.file.toLowerCase().includes('.m3u')) {
			console.log('[v0] Loading M3U playlist:', vs.file);
			fetch('/api/load-playlist?url=' + encodeURIComponent(vs.file))
				.then(r => r.json())
				.then(data => {
					console.log('[v0] Loaded playlist with ' + data.playlist.length + ' items');
					
					if (data.playlist && data.playlist.length > 0) {
						// Преобразуем в формат PlayerJS
						var items = [];
						for (var j = 0; j < data.playlist.length; j++) {
							var item = data.playlist[j];
							items.push({
								title: item.title || ('Видео ' + (j + 1)),
								file: item.file,
								poster: item.image || item.poster,
								image: item.image || item.poster
							});
						}
						
						// Устанавливаем плейлист - PlayerJS автоматически переключается между видео
						vs.playlist = items;
						vs.file = items[0].file;
						vs.poster = items[0].poster;
						vs.autoplayPlaylist = true; // Автоматически переключать видео
						vs.preload = 'auto';
						
						console.log('[v0] Playlist ready, creating player');
						new Playerjs(vs);
					}
				})
				.catch(err => {
					console.error('[v0] Error loading playlist:', err);
					new Playerjs(vs);
				});
		} 
		// Если PHP скрипт или IP адрес - проксируй
		else if (vs.file && (vs.file.includes('.php') || /^\d+\.\d+\.\d+\.\d+/.test(vs.file))) {
			console.log('[v0] Using stream proxy');
			vs.file = '/api/stream-proxy?url=' + encodeURIComponent(vs.file);
			new Playerjs(vs);
		}
		// Обычный видеофайл
		else {
			new Playerjs(vs);
		}
	</script>
</body>
</html>
