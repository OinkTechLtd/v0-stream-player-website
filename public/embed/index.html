<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PlayerJS - StreamFlow</title>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			background: #000;
		}
		#sync-info {
			position: fixed;
			bottom: 20px;
			right: 20px;
			background: rgba(0, 0, 0, 0.8);
			color: #0f0;
			padding: 10px 15px;
			border-radius: 5px;
			font-size: 12px;
			font-family: monospace;
			z-index: 1000;
			display: none;
		}
	</style>
</head>
<body>
	<div id="playerjs"></div>
	<div id="sync-info"></div>
	<script src="https://cdn.jsdelivr.net/gh/OinkTechLtd/cdnplayerjs@main/playerjs.js"></script>
	<script>
		// StreamFlow M3U Stream Manager
		var StreamFlowManager = {
			playlist: [],
			currentIndex: 0,
			streamStartTime: Date.now(),
			serverTime: Date.now(),
			videos: [],
			player: null,
			syncInterval: null,

			// Парсим M3U плейлист в браузере
			parseM3U: function(content) {
				var lines = content.split('\n');
				var videos = [];
				var currentTitle = '';
				var currentLogo = '';

				for (var i = 0; i < lines.length; i++) {
					var line = lines[i].trim();

					if (line.startsWith('#EXTINF:')) {
						var logoMatch = line.match(/tvg-logo="([^"]+)"/);
						currentLogo = logoMatch ? logoMatch[1] : '';
						currentTitle = line.split(',').pop().trim() || 'Видео';
					} else if (line && !line.startsWith('#')) {
						videos.push({
							title: currentTitle,
							file: line,
							logo: currentLogo,
							duration: 300 // default 5 min
						});
						currentTitle = '';
						currentLogo = '';
					}
				}
				return videos;
			},

			// Получаем общее время потока со смещением серверного времени
			getStreamTime: function() {
				var elapsed = Date.now() - this.streamStartTime;
				return elapsed;
			},

			// Вычисляем какой видеофайл должен воспроизводиться сейчас
			getCurrentVideo: function() {
				var streamTime = this.getStreamTime();
				var totalTime = 0;

				for (var i = 0; i < this.videos.length; i++) {
					var duration = this.videos[i].duration * 1000; // ms
					if (streamTime < totalTime + duration) {
						// Это текущий видеофайл
						var timeInVideo = streamTime - totalTime;
						return {
							index: i,
							video: this.videos[i],
							timeInVideo: timeInVideo,
							duration: duration
						};
					}
					totalTime += duration;
				}

				// Циклически повторяем плейлист
				return this.getCurrentVideo();
			},

			// Синхронизируем с сервером (получаем серверное время)
			syncWithServer: function() {
				var self = this;
				fetch('/api/sync-time', { cache: 'no-store' })
					.then(r => r.json())
					.then(data => {
						if (data.serverTime) {
							self.serverTime = data.serverTime;
							// Пересчитываем потоковое время на основе серверного времени
							self.streamStartTime = self.serverTime - self.getStreamTime();
						}
					})
					.catch(err => console.log('[v0] Server sync unavailable, using local time'));
			},

			// Загружаем M3U плейлист и инициализируем поток
			initializeStream: function(playlistUrl) {
				var self = this;
				console.log('[v0] Loading M3U playlist:', playlistUrl);

				fetch(playlistUrl)
					.then(r => r.text())
					.then(content => {
						self.videos = self.parseM3U(content);
						console.log('[v0] Parsed ' + self.videos.length + ' videos from M3U');

						if (self.videos.length === 0) {
							console.error('[v0] No videos found in M3U');
							return;
						}

						// Синхронизируем время с сервером
						self.syncWithServer();

						// Создаём плейлист для PlayerJS
						var playlistItems = [];
						for (var j = 0; j < self.videos.length; j++) {
							var v = self.videos[j];
							playlistItems.push({
								title: v.title,
								file: v.file,
								poster: v.logo,
								image: v.logo
							});
						}

						// Получаем текущее видео
						var current = self.getCurrentVideo();
						console.log('[v0] Stream initialized - current video:', current.video.title);

						// Инициализируем плеер
						var playerConfig = {
							id: 'playerjs',
							file: current.video.file,
							poster: current.video.logo,
							title: current.video.title,
							playlist: playlistItems,
							autoplay: true,
							controls: true,
							autoplayPlaylist: false // Мы сами управляем переключением
						};

						self.player = new Playerjs(playerConfig);

						// Синхронизируем плеер каждую секунду
						self.startSync();
					})
					.catch(err => {
						console.error('[v0] Error loading M3U:', err);
					});
			},

			// Синхронизируем текущее видео в плеере с виртуальным потоком
			startSync: function() {
				var self = this;

				this.syncInterval = setInterval(() => {
					var current = self.getCurrentVideo();
					
					// Если индекс видео изменился - переключаемся
					if (current.index !== self.currentIndex) {
						console.log('[v0] Switching to video ' + (current.index + 1) + ': ' + current.video.title);
						self.currentIndex = current.index;
						
						// Переключаем файл в плеере
						self.player.switchPlaylist(current.index);
					}

					// Обновляем информацию о синхронизации
					self.updateSyncInfo(current);
				}, 1000);
			},

			// Показываем информацию о синхронизации
			updateSyncInfo: function(current) {
				var info = document.getElementById('sync-info');
				var mins = Math.floor(current.timeInVideo / 60000);
				var secs = Math.floor((current.timeInVideo % 60000) / 1000);
				var totalMins = Math.floor(current.duration / 60000);
				var totalSecs = Math.floor((current.duration % 60000) / 1000);

				info.innerHTML = 
					'<div>📺 StreamFlow Live</div>' +
					'<div style="margin-top: 5px;">' + current.video.title + '</div>' +
					'<div style="margin-top: 3px; font-size: 11px;">' +
					mins + ':' + (secs < 10 ? '0' : '') + secs + ' / ' +
					totalMins + ':' + (totalSecs < 10 ? '0' : '') + totalSecs +
					'</div>';
				info.style.display = 'block';
			}
		};

		// Инициализация плеера
		var ps = location.href.substr(location.href.indexOf("html?") + 5).split("&");
		var vs = {};

		for (var i = 0; i < ps.length; i++) {
			var p = ps[i].split("=");
			vs[decodeURIComponent(p[0])] = decodeURIComponent(p[1]);
		}

		if (vs.file) {
			vs.file = decodeURIComponent(vs.file);
		}

		// Если это M3U плейлист - используем StreamFlow Manager
		if (vs.file && vs.file.toLowerCase().includes('.m3u')) {
			StreamFlowManager.initializeStream(vs.file);
		}
		// Если PHP скрипт или IP адрес - проксируй
		else if (vs.file && (vs.file.includes('.php') || /^\d+\.\d+\.\d+\.\d+/.test(vs.file))) {
			console.log('[v0] Using stream proxy');
			vs.file = '/api/stream-proxy?url=' + encodeURIComponent(vs.file);
			new Playerjs(vs);
		}
		// Обычный видеофайл или поток
		else if (vs.file) {
			new Playerjs(vs);
		}
	</script>
</body>
</html>
