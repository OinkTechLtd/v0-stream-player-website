<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PlayerJS</title>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
	<div id="playerjs"></div>
	<script src="https://cdn.jsdelivr.net/gh/OinkTechLtd/cdnplayerjs@main/playerjs.js"></script>
	<script>
		var ps = location.href.substr(location.href.indexOf("html?") + 5).split("&");
		var vs = { id: "playerjs" };

		for (var i = 0; i < ps.length; i++) {
			var p = ps[i].split("=");
			vs[decodeURIComponent(p[0])] = decodeURIComponent(p[1]);
		}

		if (vs.file) {
			vs.file = decodeURIComponent(vs.file);
		}

		// Если это M3U плейлист - загружаем и включаем автоматическое переключение видео
		if (vs.file && (vs.file.toLowerCase().includes('.m3u') || vs.file.toLowerCase().includes('.txt'))) {
			fetch(vs.file)
				.then(r => r.text())
				.then(content => {
					var lines = content.split('\n');
					var playlist = [];
					var currentTitle = '';
					
					for (var i = 0; i < lines.length; i++) {
						var line = lines[i].trim();
						
						if (line.startsWith('#EXTINF:')) {
							currentTitle = line.split(',').pop().trim() || 'Видео';
						} else if (line && !line.startsWith('#')) {
							playlist.push({
								file: line,
								title: currentTitle || 'Видео'
							});
							currentTitle = '';
						}
					}
					
					if (playlist.length > 0) {
						// Первый файл для воспроизведения
						vs.file = playlist[0].file;
						
						// Полный плейлист для автоматического переключения
						vs.playlist = playlist;
						
						// Автоматически переключаться между видео
						vs.autoplayPlaylist = true;
						
						new Playerjs(vs);
					}
				})
				.catch(err => {
					// Fallback на обычное воспроизведение
					new Playerjs(vs);
				});
		} else {
			new Playerjs(vs);
		}
	</script>
</body>
</html>
