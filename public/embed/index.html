<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PlayerJS</title>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
	<div id="playerjs"></div>
	<script src="https://cdn.jsdelivr.net/gh/OinkTechLtd/cdnplayerjs@main/playerjs.js"></script>
	<script>
		var ps = location.href.substr(location.href.indexOf("html?") + 5).split("&");
		var vs = { id: "playerjs" };

		for (var i = 0; i < ps.length; i++) {
			var p = ps[i].split("=");
			vs[decodeURIComponent(p[0])] = decodeURIComponent(p[1]);
		}

		if (vs.file) {
			vs.file = decodeURIComponent(vs.file);
		}

		// Поддержка M3U потока
		if (vs.file && vs.file.toLowerCase().includes('.m3u')) {
			fetch(vs.file)
				.then(r => r.text())
				.then(content => {
					var lines = content.split('\n');
					var segments = [];
					var titles = [];
					
					for (var i = 0; i < lines.length; i++) {
						var line = lines[i].trim();
						if (line.startsWith('#EXTINF:')) {
							titles.push(line.split(',').pop().trim() || 'Видео');
						} else if (line && !line.startsWith('#')) {
							segments.push(line);
						}
					}
					
					if (segments.length > 0) {
						vs.file = segments;
						vs.live = true;
						new Playerjs(vs);
					}
				})
				.catch(err => new Playerjs(vs));
		} else {
			new Playerjs(vs);
		}
	</script>
</body>
</html>
